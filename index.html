<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Game Archive</title>
<style>
* {
    box-sizing: border-box;
}
body {
    margin: 0;
    background: #0f0f0f;
    font-family: monospace;
    overflow: hidden;
}
.screen {
    position: relative;
    width: 96vw;
    height: 94vh;
    margin: auto;
    top: 3vh;
    background: #111;
    border-radius: 25px;
    box-shadow: 0 0 40px #000 inset;
    overflow: hidden;
}
#noise {
    position: absolute;
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(
        rgba(255,255,255,0.015) 0px,
        rgba(0,0,0,0.02) 2px
    );
    pointer-events: none;
}
.scanlines {
    position: absolute;
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(
        transparent,
        transparent 2px,
        rgba(0,0,0,0.35) 3px
    );
    pointer-events: none;
}
.search-container {
    position: absolute;
    top: 18px;
    right: 35px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    z-index: 5;
}
#searchInput {
    background: #222;
    border: 2px solid #00ff88;
    color: #00ff88;
    padding: 10px 16px;
    font-family: monospace;
    font-size: 22px;
    width: 320px;
    outline: none;
    box-shadow: 0 0 12px #00ff88;
}
#searchInput:focus {
    box-shadow: 0 0 20px #00aaff;
}
#searchResult {
    color: #ff0088;
    font-size: 17px;
    margin-top: 6px;
    min-height: 24px;
    text-shadow: 0 0 8px #ff0088;
}
.container {
    position: absolute;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    color: #00ff88;
    font-size: 28px;
    width: 80%;
    max-height: 70vh;
    overflow-y: auto;
    scrollbar-width: none;
    text-shadow: 0 0 6px #00ff88;
}
.container::-webkit-scrollbar {
    display: none;
}
.game {
    opacity: 0;
    white-space: nowrap;
    margin: 10px 0;
    transition: all 0.2s ease;
}
.game.search-match {
    color: #00aaff;
    text-shadow: 0 0 14px #00aaff, 0 0 24px #00aaff;
}
.arrow {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    color: #00ff88;
    font-size: 24px;
    opacity: 0;
    animation: blink 1s infinite;
}
#arrowDown {
    bottom: 15px;
}
#arrowUp {
    top: 15px;
}
@keyframes blink {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 1; }
}
#skipBtn {
    position: absolute;
    bottom: 20px;
    left: 20px;
    padding: 8px 14px;
    border: 1px solid #00ff88;
    background: transparent;
    color: #00ff88;
    cursor: pointer;
    font-family: monospace;
}
#skipBtn:hover {
    background: #00ff8822;
}
</style>
</head>
<body>
<div class="screen">
    <div id="noise"></div>
    <div class="scanlines"></div>
    
    <div class="search-container">
        <input id="searchInput" type="text" placeholder="Поиск игры...">
        <div id="searchResult"></div>
    </div>
    
    <div class="container" id="list"></div>
    <div id="arrowDown" class="arrow">▼</div>
    <div id="arrowUp" class="arrow">▲</div>
    <button id="skipBtn">ПРОПУСТИТЬ</button>
</div>
<script>
const games = [
    "Unpacking (2 часа)",
    "пока-что все"
];
const container = document.getElementById("list");
const arrowDown = document.getElementById("arrowDown");
const arrowUp = document.getElementById("arrowUp");
const skipBtn = document.getElementById("skipBtn");
const searchInput = document.getElementById("searchInput");
const searchResult = document.getElementById("searchResult");
let typingFinished = false;
let skipTyping = false;
function getSpeed(index) {
    if (skipTyping) return 1;
    if (index > 10) return 2;
    if (index > 5) return 5;
    return 15;
}
function typeText(text, element, speed, callback) {
    let i = 0;
    element.style.opacity = 1;
    function typing() {
        if (i < text.length && !skipTyping) {
            element.textContent += text.charAt(i);
            i++;
            setTimeout(typing, speed);
        } else {
            element.textContent = text;
            callback && callback();
        }
    }
    typing();
}
function updateArrows() {
    const current = container.scrollTop;
    if (current <= 0) {
        arrowUp.style.opacity = 0;
    } else {
        arrowUp.style.opacity = 1;
    }
    if (current + container.clientHeight >= container.scrollHeight - 1) {
        arrowDown.style.opacity = 0;
    } else {
        arrowDown.style.opacity = 1;
    }
}
container.addEventListener("scroll", updateArrows);
function clearSearchHighlights() {
    const gamesElements = container.querySelectorAll(".game");
    gamesElements.forEach(g => g.classList.remove("search-match"));
}
function showGames(index = 0) {
    if (index >= games.length) {
        typingFinished = true;
        updateArrows();
        return;
    }
    const div = document.createElement("div");
    div.className = "game";
    container.appendChild(div);
    typeText("> " + games[index], div, getSpeed(index), () => {
        container.scrollTop = container.scrollHeight;
        updateArrows();
        if (!skipTyping) {
            setTimeout(() => showGames(index + 1), 40);
        } else {
            showGames(index + 1);
        }
    });
}
searchInput.addEventListener("input", () => {
    if (searchInput.value.trim() === "") {
        clearSearchHighlights();
        searchResult.textContent = "";
    }
});
searchInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
        const query = searchInput.value.toLowerCase().trim();
        searchResult.textContent = "";
        clearSearchHighlights();
        if (!query) return;
        let count = 0;
        let firstMatch = null;
        const children = container.children;
        for (let i = 0; i < children.length; i++) {
            const gameName = children[i].textContent.replace("> ", "").toLowerCase();
            if (gameName.includes(query)) {
                count++;
                children[i].classList.add("search-match");
                if (!firstMatch) firstMatch = children[i];
            }
        }
        if (count === 0) {
            searchResult.textContent = "(игра не найдена)";
        } else {
            searchResult.textContent = `Найдено: ${count} совпадений`;
            if (firstMatch) {
                firstMatch.scrollIntoView({ behavior: "smooth", block: "center" });
            }
        }
    }
});
skipBtn.addEventListener("click", () => {
    skipTyping = true;
    typingFinished = true;
    container.innerHTML = "";
    games.forEach(game => {
        const div = document.createElement("div");
        div.className = "game";
        div.style.opacity = 1;
        div.textContent = "> " + game;
        container.appendChild(div);
    });
    container.scrollTop = container.scrollHeight;
    requestAnimationFrame(updateArrows);
});
showGames();
</script>
</body>
</html>
